<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | NORETHINDRONE</title>
    <link rel="stylesheet" href="adminstyle.css">
    <link rel="icon" href="../Icon/favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
    <h1 class="floral-text">NORETHINDRONE</h1>
    <button class="menu" onclick="toggleMenu()">&#9776;</button>
    <nav id="mainNav">
    <ul>
        <li><b class="floral-text"><a href="../Home/Home.html">HOME</a></b></li>
        <li><b class="floral-text"><a href="../Gallery/Gallery.html">GALLERY</a></b></li>
        <li><b class="floral-text"><a href="admin.html">ADMIN</a></b></li>
    </ul>
    </nav>
    </header>

    <main>
        <div class="admin-container">

            <!-- LOGIN SECTION (shown when not authenticated) -->
            <div id="loginSection" style="display:none">
                <div class="login-card">
                    <div class="login-icon">
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="#c9a87c"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                    </div>
                    <h2>GALLERY ADMIN</h2>
                    <p class="login-desc">Sign in with GitHub to manage photos</p>
                    <button class="login-btn" onclick="doLogin()">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                        Login with GitHub
                    </button>
                </div>
            </div>

            <!-- ADMIN SECTION (shown when authenticated) -->
            <div id="adminSection" style="display:none">

                <!-- user bar -->
                <div class="user-bar">
                    <img id="userAvatar" class="user-avatar" src="" alt="">
                    <span id="userName" class="user-name"></span>
                    <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
                </div>

                <!-- upload section -->
                <div class="upload-section">
                    <h2>UPLOAD PHOTO</h2>
                    <div class="upload-form">
                        <div class="form-row">
                            <div class="file-input-wrapper">
                                <input type="file" id="fileInput" accept="image/jpeg,image/png">
                                <label for="fileInput" class="file-label" id="fileLabel">SELECT IMAGE</label>
                                <span class="file-name" id="fileName"></span>
                            </div>
                            <input type="text" class="title-input" id="titleInput" placeholder="Title (optional)">
                            <button class="upload-btn" id="uploadBtn">UPLOAD</button>
                        </div>
                        <div class="upload-status" id="uploadStatus"></div>
                    </div>
                </div>

                <!-- divider -->
                <div class="section-divider">
                    <span>PHOTOS</span>
                </div>

                <!-- photo grid -->
                <div class="photo-grid" id="photoGrid"></div>
                <div class="empty-state" id="emptyState" style="display:none">No photos yet</div>

            </div>

        </div>
    </main>

    <footer>
        <p><b class="floral-text"><a href="mailto:dl_benzoin@outlook.com">E-mail:dl_benzoin@outlook.com</a></b></p>
    </footer>

    <script>
    function toggleMenu() {
        var nav = document.getElementById("mainNav");
        nav.classList.toggle("mobile-visible");
    }
    </script>
    <script src="admin.js"></script>
</body>
</html>
